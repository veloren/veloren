[package]
name = "nova-forge-server-agent"
version.workspace = true
edition.workspace = true
license.workspace = true

[lints]
workspace = true

[features]
worldgen = []
use-dyn-lib = ["common-dynlib"]
be-dyn-lib = []

[dependencies]
common = { package = "nova-forge-common", path = "../../common" }
common-base = { package = "nova-forge-common-base", path = "../../common/base" }
common-dynlib = { package = "nova-forge-common-dynlib", path = "../../common/dynlib", optional = true }
world = { package = "nova-forge-world", path = "../../world" }
rtsim = { package = "nova-forge-rtsim", path = "../../rtsim" }

specs = { workspace = true, features = ["shred-derive"] }
vek = { workspace = true }
rand = { workspace = true }
itertools = { workspace = true }
lazy_static = { workspace = true }
tracing = { workspace = true }
